<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAAE Core | Production Studio Suite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h1>MAAE Core</h1>
        <div class="subtitle">Production Studio Suite</div>

        <div class="input-group">
            <label>STUDIO DIRECTIVE MANIFEST</label>
            <div class="token-bank">
                <span class="tag-token" onclick="insertToken('Mama Akos')">+ Mama Akos</span>
                <span class="tag-token" onclick="insertToken('Kofi')">+ Kofi</span>
                <span class="tag-token" onclick="insertToken('Papa Kofi')">+ Papa Kofi</span>
                <span class="tag-token" onclick="insertToken('Akos Kofi\'s sister')">+ Akos Kofi's sister</span>
            </div>
            
            <input type="text" id="prompt-input" placeholder="Enter plot idea here...">
            <button id="script-btn" onclick="generateScript()">SCRIPT ENGINE</button>
        </div> 

        <div id="workspace"></div>

       
    <button id="video-btn" class="render-video-btn" onclick="renderVideo()">RENDER VIDEO</button>

<div class="container-box">
    <div id="video-feed"></div>
</div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8GNkZaVVV92w9-C2IN3jLzep8-zoUk8U",
  authDomain: "maae-studio-production.firebaseapp.com",
  projectId: "maae-studio-production",
  storageBucket: "maae-studio-production.firebasestorage.app",
  messagingSenderId: "794442926010",
  appId: "1:794442926010:web:363376744b9618cb57f83",
  measurementId: "G-SMN471NV3F"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
        
        // Appends character names to the input field
        function insertToken(token) {
            const input = document.getElementById('prompt-input');
            input.value += (input.value ? ", " : "") + token;
        }

        // Logic to communicate with your flask_app.py
            async function generateScript() {
    const btn = document.getElementById('script-btn');
    const input = document.getElementById('prompt-input');
    const workspace = document.getElementById('workspace');
    const notify = document.getElementById('custom-notification');

    // Validation logic
    if (input.value.trim() === "") {
        notify.style.display = "block";
        setTimeout(() => { notify.style.display = "none"; }, 3000);
        return;
    }

    btn.disabled = true;
    btn.innerText = "WRITING...";
    workspace.innerText = "Sourcing computational layers...";
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: input.value })
                });
                const data = await response.json();
                workspace.innerText = data.script || "Error: No script returned.";
            } catch (e) {
                workspace.innerText = "Connection error: " + e;
            } finally {
                btn.disabled = false;
                btn.innerText = "SCRIPT ENGINE";
            }
        }

        async function renderVideo() {
    const vBtn = document.getElementById('video-btn');
    const feed = document.getElementById('video-feed');
    const workspace = document.getElementById('workspace');
    
    // Grab the script currently in the workspace
    const scriptText = workspace.innerText;

    vBtn.innerText = "RENDERING...";
    feed.innerText = "Connecting to Video Production Node...";

    try {
        const response = await fetch('/api/render-video', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ script: scriptText })
        });
        const data = await response.json();
        
        if (data.status === "success") {
            feed.innerHTML = `<video controls width="100%"><source src="${data.video_url}" type="video/mp4"></video>`;
        } else {
            feed.innerText = "Render failed: " + data.message;
        }
    } catch (e) {
        feed.innerText = "Connection error: " + e;
    } finally {
        vBtn.innerText = "RENDER VIDEO";
    }
        }
    </script>
</body>
</html>
